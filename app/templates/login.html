{% extends "base.html" %}
{% block title %}Login | Supply Chain{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="panel-card">
            <div class="hero-banner mb-3">
                <h3 class="mb-1">Welcome Back</h3>
                <p class="mb-0 hero-subtitle">Sign in to your supply chain control center.</p>
            </div>
            <div class="p-2">
                <form method="post" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <button class="btn btn-theme w-100" type="submit">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <small>Don't have an account? <a href="{{ url_for('auth.register') }}">Signup</a></small>
                </div>
                <hr class="my-3">
                <small class="text-muted d-block">Demo Admin: admin@supplychain.com / admin123</small>
                <small class="text-muted d-block">Demo User: user@supplychain.com / user123</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
