{% extends "base.html" %}
{% block title %}Register | Supply Chain{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-5">
        <div class="panel-card">
            <div class="hero-banner mb-3">
                <h3 class="mb-1">Create Account</h3>
                <p class="mb-0 hero-subtitle">Join your team dashboard with role-based access.</p>
            </div>
            <div class="p-2">
                <form method="post" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name</label>
                        <input class="form-control" type="text" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input class="form-control" type="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Role</label>
                        <select class="form-select" name="role">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button class="btn btn-theme w-100" type="submit">Create Account</button>
                </form>
                <div class="mt-3 text-center">
                    <small>Already registered? <a href="{{ url_for('auth.login') }}">Login</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
